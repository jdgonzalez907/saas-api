version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations/"
    queries: "db/queries/"
    gen:
      go:
        package: "sqlc"
        out: "internal/shared/infrastructure/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: false
